definitions:
  domain.ASTNode:
    properties:
      id:
        type: string
      size:
        type: integer
      type:
        type: string
      value:
        type: string
    type: object
  domain.AnalyticsResponse:
    properties:
      average_score:
        type: number
      exam_id:
        type: integer
      total_submissions:
        type: integer
    type: object
  domain.ExamRequest:
    properties:
      duration:
        minimum: 1
        type: integer
      max_attempts:
        minimum: 1
        type: integer
      question_ids:
        items:
          type: integer
        minItems: 10
        type: array
      title:
        type: string
      valid_from:
        type: string
      valid_to:
        type: string
    required:
    - duration
    - max_attempts
    - question_ids
    - title
    - valid_from
    - valid_to
    type: object
  domain.ExamResponse:
    properties:
      created_at:
        type: string
      duration:
        type: integer
      id:
        type: integer
      questions:
        items:
          $ref: '#/definitions/domain.QuestionResponse'
        type: array
      title:
        type: string
    type: object
  domain.ExamSession:
    properties:
      ended_at:
        description: Dynamic deadline calculated at start.
        type: string
      exam_id:
        type: integer
      id:
        type: integer
      provided_answers:
        type: object
      started_at:
        type: string
      status:
        type: string
      submitted_at:
        type: string
      user_id:
        type: integer
    type: object
  domain.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      tenant_id:
        type: integer
    required:
    - email
    - password
    - tenant_id
    type: object
  domain.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  domain.QuestionContent:
    properties:
      instruction:
        type: string
      media_url:
        type: string
      nodes:
        items:
          $ref: '#/definitions/domain.ASTNode'
        type: array
    type: object
  domain.QuestionRequest:
    properties:
      content:
        $ref: '#/definitions/domain.QuestionContent'
      correct_data:
        additionalProperties: true
        type: object
      tags:
        items:
          type: string
        type: array
      type:
        type: string
    required:
    - content
    - correct_data
    - type
    type: object
  domain.QuestionResponse:
    properties:
      content:
        $ref: '#/definitions/domain.QuestionContent'
      correct_data:
        additionalProperties: true
        type: object
      created_at:
        type: string
      id:
        type: integer
      tags:
        items:
          type: string
        type: array
      type:
        type: string
    type: object
  domain.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      role:
        type: string
      tenant_id:
        type: integer
    required:
    - email
    - password
    - tenant_id
    type: object
  domain.SessionResponse:
    properties:
      ended_at:
        type: string
      exam_id:
        type: integer
      session_id:
        type: integer
      started_at:
        type: string
      status:
        type: string
      time_left_ms:
        type: integer
    type: object
  domain.SubmitRequest:
    properties:
      answers:
        additionalProperties: true
        type: object
    required:
    - answers
    type: object
  domain.Tenant:
    properties:
      code:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      role:
        type: string
      tenant_id:
        type: integer
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: API for managing multi-tenant assessments
  title: Assessment Core Engine API
  version: "1.0"
paths:
  /api/v1/account:
    delete:
      description: Allow a logged-in user to (soft) delete their own account. It requires
        a valid JWT token
      produces:
      - application/json
      responses:
        "204":
          description: 'No content: Account successfully deleted'
        "401":
          description: 'Unauthorized: Missing or invalid token'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: 'Internal server error: Failed to delete account'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete current user account.
      tags:
      - Account
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT
      parameters:
      - description: Login info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully authenticated
          schema:
            $ref: '#/definitions/domain.LoginResponse'
        "400":
          description: 'Bad request: Invalid request body'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'Unauthorized: Invalid credentials'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - Authentication
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account bound to a specific tenant
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully registered user
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: 'Bad request: Invalid request body or validation failed'
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 'Conflict: User already exists in the specified tenant'
          schema:
            type: onject
      summary: Register a new user
      tags:
      - Authentication
  /api/v1/exams:
    get:
      description: Retrieve a list of exams with pagination support
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of exams
          schema:
            items:
              $ref: '#/definitions/domain.ExamResponse'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List exams
      tags:
      - Exams
    post:
      consumes:
      - application/json
      description: Add a new exam to the system under the current tenant
      parameters:
      - description: Exam payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.ExamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created exam
          schema:
            $ref: '#/definitions/domain.ExamResponse'
        "400":
          description: 'Bad request: Invalid payload'
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 'Conflict: Exam data conflicts'
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: 'Unprocessable entity: Validation failed'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create an exam
      tags:
      - Exams
  /api/v1/exams/{exam_id}/my-attempts:
    get:
      description: Fetch a list of sessions/attempts the current user has made for
        a given exam
      parameters:
      - description: Exam ID
        in: path
        name: exam_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: List of attempts
          schema:
            items:
              $ref: '#/definitions/domain.ExamSession'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List my attempts for an exam
      tags:
      - Sessions
  /api/v1/exams/{exam_id}/sessions:
    post:
      description: Create a new attempt for a specific exam
      parameters:
      - description: Exam ID
        in: path
        name: exam_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "201":
          description: Session started successfully
          schema:
            $ref: '#/definitions/domain.SessionResponse'
        "403":
          description: 'Forbidden: User cannot start session (in example, max attempts
            reached)'
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 'Conflict: An active session already exists'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Start exam session
      tags:
      - Sessions
  /api/v1/exams/{id}:
    delete:
      description: Delete an exam by ID
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 'No content: Successfully deleted'
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete an exam
      tags:
      - Exams
    get:
      description: Teachers get correct answers, students get cached sanitized versions
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Exam details
          schema:
            $ref: '#/definitions/domain.ExamResponse'
        "404":
          description: Exam not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get exam details
      tags:
      - Exams
    put:
      consumes:
      - application/json
      description: Update an exam's details by its ID
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: integer
      - description: Exam payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.ExamRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated exam
          schema:
            $ref: '#/definitions/domain.ExamResponse'
        "400":
          description: 'Bad request: Invalid payload'
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update an exam
      tags:
      - Exams
  /api/v1/exams/{id}/analytics:
    get:
      description: 'Retrieve analytics data for an exam (in example: average score,
        completion rate).'
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Analytics data
          schema:
            $ref: '#/definitions/domain.AnalyticsResponse'
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get exam analytics
      tags:
      - Exams
  /api/v1/exams/sessions/{session_id}:
    get:
      description: Retrieve the current state of a specific session.
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Session details
          schema:
            $ref: '#/definitions/domain.SessionResponse'
        "404":
          description: 'Not found: Session does not exist'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get active session status
      tags:
      - Sessions
  /api/v1/exams/sessions/{session_id}/submit:
    post:
      consumes:
      - application/json
      description: Submit user answers and finalize the session, protected by Redis
        lock to prevent double-submissions
      parameters:
      - description: Session ID
        in: path
        name: session_id
        required: true
        type: integer
      - description: Answers payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.SubmitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'OK: Successfully submitted'
        "400":
          description: 'Bad request: Invalid payload'
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'Forbidden: Unauthorized to submit this session'
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 'Conflict: Already submitted or being processed'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Submit answers
      tags:
      - Sessions
  /api/v1/questions:
    get:
      description: Fetch questions belonging to the tenant, exclude correct answers
        depending on logic
      parameters:
      - description: Filter by Type
        in: query
        name: type
        type: string
      - description: Filter by Tag
        in: query
        name: tag
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved list
          schema:
            items:
              $ref: '#/definitions/domain.QuestionResponse'
            type: array
        "401":
          description: 'Unauthorized: Missing or invalid token'
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List questions
      tags:
      - Questions
    post:
      consumes:
      - application/json
      description: Add a new abstract syntax tree (AST) question (teacher/admin only)
      parameters:
      - description: Question payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.QuestionRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created
          schema:
            $ref: '#/definitions/domain.QuestionResponse'
        "400":
          description: 'Bad request: Invalid payload'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: 'Forbidden: Insufficient role permissions'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a question
      tags:
      - Questions
  /api/v1/questions/{id}:
    delete:
      description: Remove a question by ID
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: 'No content: Successfully deleted'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete question
      tags:
      - Questions
    get:
      description: Retrieve a single question's details
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved
          schema:
            $ref: '#/definitions/domain.QuestionResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: 'Not found: Question does not exist'
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get question by ID
      tags:
      - Questions
    put:
      consumes:
      - application/json
      description: Modify an existing question's details by ID
      parameters:
      - description: Question ID
        in: path
        name: id
        required: true
        type: integer
      - description: Question payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.QuestionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated
          schema:
            $ref: '#/definitions/domain.QuestionResponse'
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update question
      tags:
      - Questions
  /api/v1/questions/bulk:
    post:
      consumes:
      - application/json
      description: Upload an array of questions simultaneously
      parameters:
      - description: Array of questions
        in: body
        name: request
        required: true
        schema:
          items:
            $ref: '#/definitions/domain.QuestionRequest'
          type: array
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Bulk insert questions
      tags:
      - Questions
  /api/v1/tenants:
    get:
      description: Retrieve a list of all organizations
      produces:
      - application/json
      responses:
        "200":
          description: List of tenants
          schema:
            items:
              $ref: '#/definitions/domain.Tenant'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all tenants
      tags:
      - Tenants
    post:
      consumes:
      - application/json
      description: Add a new organization to the system
      parameters:
      - description: Tenant info
        in: body
        name: tenant
        required: true
        schema:
          $ref: '#/definitions/domain.Tenant'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created tenant
          schema:
            $ref: '#/definitions/domain.Tenant'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Tenant already exists or database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new tenant
      tags:
      - Tenants
  /api/v1/tenants/{id}:
    delete:
      description: Delete a tenant by ID
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: 'No content: Successfully deleted'
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a tenant
      tags:
      - Tenants
    get:
      description: Retrieve a single organization by its unique identifier
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved tenant
          schema:
            $ref: '#/definitions/domain.Tenant'
        "404":
          description: Tenant not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get tenant by ID
      tags:
      - Tenants
    put:
      consumes:
      - application/json
      description: Update a tenant by ID with the provided JSON payload and return
        the updated record.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated tenant information
        in: body
        name: tenant
        required: true
        schema:
          $ref: '#/definitions/domain.Tenant'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated tenant
          schema:
            $ref: '#/definitions/domain.Tenant'
        "400":
          description: 'Bad request: Invalid payload or update failed'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update entire tenant
      tags:
      - Tenants
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
