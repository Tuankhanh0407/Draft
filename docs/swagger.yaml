basePath: /
definitions:
  domain.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
      tenant_id:
        type: integer
    required:
    - email
    - password
    - tenant_id
    type: object
  domain.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/domain.User'
    type: object
  domain.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
      role:
        type: string
      tenant_id:
        type: integer
    required:
    - email
    - password
    - tenant_id
    type: object
  domain.Tenant:
    properties:
      code:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  domain.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      role:
        type: string
      tenant_id:
        type: integer
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for managing multi-tenant assessments
  title: Assessment Core Engine API
  version: "1.0"
paths:
  /api/v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user and return a JWT
      parameters:
      - description: Login info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully authenticated
          schema:
            $ref: '#/definitions/domain.LoginResponse'
        "400":
          description: 'Bad request: Invalid request body'
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: 'Unauthorized: Invalid credentials'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - Authentication
  /api/v1/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account bound to a specific tenant
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully registered user
          schema:
            $ref: '#/definitions/domain.User'
        "400":
          description: 'Bad request: Invalid request body or validation failed'
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: 'Conflict: User already exists in the specified tenant'
          schema:
            type: onject
      summary: Register a new user
      tags:
      - Authentication
  /api/v1/tenants:
    get:
      description: Retrieve a list of all organizations
      produces:
      - application/json
      responses:
        "200":
          description: List of tenants
          schema:
            items:
              $ref: '#/definitions/domain.Tenant'
            type: array
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all tenants
      tags:
      - Tenants
    post:
      consumes:
      - application/json
      description: Add a new organization to the system
      parameters:
      - description: Tenant info
        in: body
        name: tenant
        required: true
        schema:
          $ref: '#/definitions/domain.Tenant'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created tenant
          schema:
            $ref: '#/definitions/domain.Tenant'
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Tenant already exists or database error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new tenant
      tags:
      - Tenants
  /api/v1/tenants/{id}:
    delete:
      description: Delete a tenant by ID
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: 'No content: Successfully deleted'
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a tenant
      tags:
      - Tenants
    get:
      description: Retrieve a single organization by its unique identifier
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved tenant
          schema:
            $ref: '#/definitions/domain.Tenant'
        "404":
          description: Tenant not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get tenant by ID
      tags:
      - Tenants
    put:
      consumes:
      - application/json
      description: Update a tenant by ID with the provided JSON payload and return
        the updated record.
      parameters:
      - description: Tenant ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated tenant information
        in: body
        name: tenant
        required: true
        schema:
          $ref: '#/definitions/domain.Tenant'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated tenant
          schema:
            $ref: '#/definitions/domain.Tenant'
        "400":
          description: 'Bad request: Invalid payload or update failed'
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update entire tenant
      tags:
      - Tenants
  /ws/v1/exams/{id}/live:
    get:
      description: Upgrade HTTP connection to WebSocket to receive real-time submission
        events (WS client required, not testable via Swagger UI directly).
      parameters:
      - description: Exam ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "101":
          description: Switching protocols to WebSocket
          schema:
            type: string
        "426":
          description: Update required
          schema:
            type: string
      summary: Connect to live dashboard WebSocket
      tags:
      - Dashboards
swagger: "2.0"
